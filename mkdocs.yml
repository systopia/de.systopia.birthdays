site_name: Birthdays
site_description: Provides tools to keep track of your contacts' birthdays, e.g. a report and automatic greetings via e-mail.
site_author: SYSTOPIA
repo_url: https://github.com/systopia/de.systopia.birthdays

theme:
  name: material

nav:
  - 'Introduction': index.md
  - 'Report': report.md
  - 'Birthday mailings': birthday_mailings.md
  - 'Localisation': localisation.md

markdown_extensions:
  - attr_list
  - admonition
  - def_list
  - codehilite
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tilde
  - pymdownx.betterem
  - pymdownx.mark

plugins:
  - search:
      lang: en
